
<!DOCTYPE html>
<html>
<head>
<title>Krishna Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#fff7f0;
}

header{
background:#ff6b00;
color:white;
padding:15px;
text-align:center;
}

.search{
padding:15px;
text-align:center;
}

.search input{
width:80%;
padding:10px;
font-size:16px;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.item{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 5px #ccc;
text-align:center;
}

.item img{
width:100%;
border-radius:10px;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:10px;
margin-top:5px;
cursor:pointer;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<header>
<h2>Krishna Food</h2>
</header>

<div class="search">
<input placeholder="Search food...">
</div>

<div class="menu">

<div class="item">
<img src="https://images.unsplash.com/photo-1604908176997-431d1e9dba20">
<h3>Paneer Butter Masala</h3>
<p>₹180</p>
<button>Add to cart</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>Kadhai Paneer</h3>
<p>₹170</p>
<button>Add to cart</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1604908177225-9c1a40add352">
<h3>Pani Puri</h3>
<p>₹40</p>
<button>Add to cart</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1589308078055-eb5d7a9d1e9f">
<h3>Veg Chowmein</h3>
<p>₹80</p>
<button>Add to cart</button>
</div>

</div>

<div class="footer">
<div>Home</div>
<div>Account</div>
<div>Orders</div>
<div>Cart</div>
</div>

</body>
</html>
