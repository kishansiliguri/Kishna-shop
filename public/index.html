<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krishna Food</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:#ff6b00;
color:white;
padding:10px;

display:flex;
align-items:center;
gap:10px;}

/* TOP BAR */

.top-bar{
display:flex;
align-items:center;
justify-content:space-between;
}

/* LOGO + BRAND */

.brand-area{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:35px;
height:35px;
background:white;
border-radius:6px;
}

.brand{
font-size:18px;
font-weight:bold;
}

/* SEARCH */

.search{
flex:1;
margin:0 8px;
}

.search input{
width:100%;
padding:6px;
border:none;
border-radius:6px;
font-size:14px;
}

/* WELCOME */

.welcome{
display:flex;
flex-direction:column;
align-items:center;
font-size:10px;
min-width:40px;
}

/* DESKTOP MENU */

.menu{
display:none;
gap:20px;
font-size:15px;
}

/* TABLET */

@media(min-width:768px){

.search{
max-width:400px;
}

}

/* DESKTOP */

@media(min-width:1024px){

.header{
display:flex;
align-items:center;
justify-content:space-between;
}

.search{
margin:0;
flex:1;
padding:0 20px;
}

.welcome{
margin:0;
}

.menu{
display:flex;
}

}

</style>
</head>

<body>

<div class="header">

<div class="brand-area">

<div class="brand">
Krishna Food
</div>

</div>

<div class="search">

<input type="text" placeholder="Search food">

</div>

<div class="menu">

<div>Home</div>
<div>Cart</div>
<div>My Account</div>

</div>

<div class="welcome">
<div>👤</div>
<small>Login</small>
</div>

</div>

</body>
</html>
