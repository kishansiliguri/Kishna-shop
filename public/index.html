<!DOCTYPE html>
<html>
<head>
<title>Krishna Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f6f6f6;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.icons span{
margin-left:10px;
font-size:20px;
}

.greeting{
padding:0 15px;
}

.greeting h3{
color:#ff6b00;
margin:0;
}

.greeting h1{
margin:5px 0;
}

.banner{
padding:15px;
}

.banner img{
width:100%;
border-radius:15px;
}

.section{
padding:15px;
}

.categories{
display:flex;
gap:10px;
overflow-x:auto;
}

.cat{
text-align:center;
}

.cat img{
width:70px;
height:70px;
border-radius:15px;
border:3px solid #ff6b00;
}

.food{
display:flex;
gap:10px;
margin-top:10px;
background:white;
padding:10px;
border-radius:12px;
}

.food img{
width:90px;
height:90px;
border-radius:10px;
}

.price{
color:#ff6b00;
font-weight:bold;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

/* Desktop hide footer */
@media(min-width:768px){
.footer{
display:none;
}
}

</style>
</head>

<body>

<div class="header">
☰
<div class="icons">
<span>🔍</span>
<span>🗺</span>
<span>🛒</span>
</div>
</div>

<div class="greeting">
<h3>Hello Customer</h3>
<h1>Find your food</h1>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
</div>

<div class="section">
<h3>Categories</h3>

<div class="categories">

<div class="cat">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<p>Burger</p>
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1604908176997-4317a6c6d99e">
<p>Paneer</p>
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<p>Rice</p>
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1585238342028-4c91b9c2c6c0">
<p>Snacks</p>
</div>

</div>
</div>

<div class="section">

<h3>Popular Food Nearby</h3>

<div class="food">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div>
<h4>Classic Burger</h4>
<p>Krishna Food</p>
<p class="price">₹120</p>
</div>
</div>

<div class="food">
<img src="https://images.unsplash.com/photo-1604908176997-4317a6c6d99e">
<div>
<h4>Paneer Butter Masala</h4>
<p>Krishna Food</p>
<p class="price">₹160</p>
</div>
</div>

</div>

<div class="footer">
<span>🏠 Home</span>
<span>📦 Orders</span>
<span>🛒 Cart</span>
<span>👤 Account</span>
</div>

</body>
</html>
