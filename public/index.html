<!DOCTYPE html>
<html>
<head>
<title>Krishna Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff6b00;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.search{
padding:10px;
text-align:center;
background:white;
}

.search input{
width:90%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.banner{
margin:10px;
border-radius:10px;
overflow:hidden;
}

.banner img{
width:100%;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#ff6b00;
font-weight:bold;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ccc;
}

</style>
</head>

<body>

<header>Krishna Food</header>

<div class="search">
<input type="text" placeholder="Search food...">
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
</div>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-4317a6c6d99e">
<h3>Paneer Butter Masala</h3>
<p class="price">₹160</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>Kadhai Paneer</h3>
<p class="price">₹150</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-4026fbe0f5b6">
<h3>Veg Biryani</h3>
<p class="price">₹120</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1625943555419-56a2cb596640">
<h3>Pani Puri</h3>
<p class="price">₹40</p>
<button>Add to Cart</button>
</div>

</div>

<div class="footer">
<span>🏠 Home</span>
<span>📦 Orders</span>
<span>🛒 Cart</span>
<span>👤 Account</span>
</div>

</body>
</html>
