<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krishna Food</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#ff6b00;
display:flex;
align-items:center;
padding:10px;
gap:8px;
}

/* TOP BAR */

.top-bar{
display:flex;
align-items:center;
justify-content:space-between;
}

/* LOGO + BRAND */

.brand-area{
display:flex;
align-items:center;
gap:5px;
}

.logo{
width:35px;
height:35px;
background:white;
border-radius:6px;
}

.brand{
color:white;
font-weight:bold;
font-size:16px;
}

/* SEARCH */

.search{
flex:1;
display:flex;
justify-content:center;
}

.search input{
width:75%;
padding:8px;
border-radius:20px;
border:none;
}

/* WELCOME */
.welcome{
width:55px;
text-align:center;
font-size:12px;
margin-right:5px;
color:white;}

.welcome i{
font-size:22px;
}

/* DESKTOP MENU */

.menu{
display:none;
gap:20px;
font-size:15px;
}

/* TABLET */

@media(min-width:768px){

.search{
max-width:400px;
}

}

/* DESKTOP */

@media(min-width:1024px){

.header{
display:flex;
align-items:center;
justify-content:space-between;
}

.search{
margin:0;
flex:1;
padding:0 20px;
}

.welcome{
margin:0;
}

.menu{
display:flex;
color:white;
}
/* SIMPLE MOBILE SLIDER */

.slider{
  margin-top:80px;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slider img{
  width:100%;
  flex:0 0 100%;
  height:180px;
  object-fit:cover;
  scroll-snap-align:start;
}
</style>
</head>

<body>

<div class="header">

<div class="brand-area">

<div class="brand">
Krishna Food
</div>

</div>

<div class="search">

<input type="text" placeholder="Search food">

</div>

<div class="menu">

<div>Home</div>
<div>Cart</div>
<div>My Account</div>
<div>Shop</div>
</div>

<div class="welcome">
<div>👤</div>
<small>Login</small>
</div>

</div> 

<div class="slider">


<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</div>

</div>

</body>
</html>
