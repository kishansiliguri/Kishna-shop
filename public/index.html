<h1 style="color:red">TEST PAGE</h1>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krishna Food</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#ff6b00;
display:flex;
align-items:center;
padding:10px;
gap:8px;
}

/* TOP BAR */

.top-bar{
display:flex;
align-items:center;
justify-content:space-between;
}

/* LOGO + BRAND */

.brand-area{
display:flex;
align-items:center;
gap:5px;
}

.logo{
width:35px;
height:35px;
background:white;
border-radius:6px;
}

.brand{
color:white;
font-weight:bold;
font-size:16px;
}

/* SEARCH */

.search{
flex:1;
display:flex;
justify-content:center;
}

.search input{
width:75%;
padding:8px;
border-radius:20px;
border:none;
}

/* WELCOME */
.welcome{
width:55px;
text-align:center;
font-size:12px;
margin-right:5px;
color:white;}

.welcome i{
font-size:22px;
}

/* DESKTOP MENU */

.menu{
display:none;
gap:20px;
font-size:15px;
}

/* TABLET */

@media(min-width:768px){

.search{
max-width:400px;
}

}

/* DESKTOP */

@media(min-width:1024px){

.header{
display:flex;
align-items:center;
justify-content:space-between;
}

.search{
margin:0;
flex:1;
padding:0 20px;
}

.welcome{
margin:0;
}

.menu{
display:flex;
color:white;
}
/* BANNER */
.banner{
position:relative;
width:100%;
margin-top:60px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

@media(max-width:600px){
.banner{
height:150px;
}
}

/* ORDER BUTTON */

.order-btn{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);

background:#ff6b00;
color:white;

padding:10px 20px;
border-radius:25px;

text-decoration:none;
font-weight:bold;

animation:pulse 1.5s infinite;
}

/* ANIMATION */

@keyframes pulse{

0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.1);}
100%{transform:translateX(-50%) scale(1);}

}
/* CATEGORY SECTION */

.categories{
padding:20px;
}

.categories h2{
margin-bottom:15px;
font-size:20px;
}

.category-list{
display:flex;
gap:15px;
overflow-x:auto;
}

.category{
text-align:center;
min-width:80px;
}

.category img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.category p{
font-size:12px;
margin-top:6px;
}

</style>
</head>

<body>

<div class="header">

<div class="brand-area">

<div class="brand">
Krishna Food
</div>

</div>

<div class="search">

<input type="text" placeholder="Search food">

</div>

<div class="menu">

<div>Home</div>
<div>Cart</div>
<div>My Account</div>
<div>Shop</div>
</div>

<div class="welcome">
<div>👤</div>
<small>Login</small>
</div>

</div> 
<div class="banner">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

<a href="#" class="order-btn">Order Now</a>

</div>
<!-- CATEGORY SECTION -->
<div class="categories">

<h2>Explore Categories</h2>

<div class="category-list">

<div class="category">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<p>Pizza</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<p>Burger</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1562967916-eb82221dfb36">
<p>Sushi</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<p>Healthy</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<p>Indian</p>
</div>

</div>

</div>
</body>
</html>
